apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: tienda-perritos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 823731292670.dkr.ecr.us-east-1.amazonaws.com/tienda-perritos-backend:latest
          ports:
            - containerPort: 3001
          env:
            - name: DB_HOST
              value: db
            - name: DB_USER
              value: root
            - name: DB_PASSWORD
              value: admin123
            - name: DB_NAME
              value: tienda_perritos