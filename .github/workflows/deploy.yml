name: Deploy Tienda Perritos to AWS EKS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------- AWS CREDENTIALS ----------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ---------------- INSTALL KUBECTL ----------------
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      # ---------------- LOGIN TO ECR ----------------
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ---------------- SET VARIABLES ----------------
      - name: Set ECR registry
        run: |
          echo "AWS_REGION=${{ secrets.AWS_REGION }}" >> $GITHUB_ENV
          echo "ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com" >> $GITHUB_ENV

      # ---------------- BUILD + PUSH BACKEND ----------------
      - name: Build and push backend image
        run: |
          docker build -t $ECR_REGISTRY/tienda-perritos-backend:latest ./backend
          docker push $ECR_REGISTRY/tienda-perritos-backend:latest

      # ---------------- BUILD + PUSH FRONTEND ----------------
      - name: Build and push frontend image
        run: |
          docker build -t $ECR_REGISTRY/tienda-perritos-frontend:latest ./frontend
          docker push $ECR_REGISTRY/tienda-perritos-frontend:latest

      # ---------------- UPDATE KUBE CONFIG ----------------
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name tienda-perritos-cluster --region $AWS_REGION

      # ---------------- DEPLOY TO EKS ----------------
      - name: Deploy to EKS
        run: |
          kubectl apply -f EKS/
          kubectl rollout restart deployment backend-deployment
          kubectl rollout restart deployment frontend-deployment