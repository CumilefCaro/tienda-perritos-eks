apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: tienda-perritos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 823731292670.dkr.ecr.us-east-1.amazonaws.com/tienda-perritos-frontend:v2
          ports:
            - containerPort: 80